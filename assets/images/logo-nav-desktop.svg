<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60">
  <!-- I: mais espesso e visível -->
  <line x1="12" y1="11" x2="12" y2="49" stroke="#8B6F47" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="7" y1="11" x2="17" y2="11" stroke="#8B6F47" stroke-width="2" stroke-linecap="round"/>
  <line x1="7" y1="49" x2="17" y2="49" stroke="#8B6F47" stroke-width="2" stroke-linecap="round"/>

  <!-- D: começa com gap claro de 10px após o I -->
  <line x1="27" y1="11" x2="27" y2="49" stroke="#B8976A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M27 11 C27 11 44 11 48 22 C52 30 52 30 48 38 C44 47 27 49 27 49"
